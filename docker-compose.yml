version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (faster, used internally by qdrant-client when available)
    volumes:
      - qdrant_storage:/qdrant/storage   # persists across `docker compose down` / restarts
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage: